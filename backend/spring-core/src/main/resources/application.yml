server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

spring:
  application:
    name: spring-core
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/signalfoundry}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: core
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas:
      - core
    default-schema: core
    out-of-order: true

app:
  jwt:
    secret: ${JWT_SECRET:signalfoundry-dev-secret-key-at-least-32-bytes!}
    expiration-hours: 24
  fastapi:
    url: ${FASTAPI_URL:http://localhost:8000}
